name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 3

      - name: Test
        run: pnpm test:run 2>&1 | tee test.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          retention-days: 3

      - name: Build
        run: pnpm build 2>&1 | tee build.log

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          retention-days: 3
